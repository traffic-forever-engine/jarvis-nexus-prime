name: Jarvis 2.0 Autonomous Sprint

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch: # Manual trigger
  repository_dispatch:
    types: [emergency_fix]

jobs:
  sprint:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      AMAZON_TAG_1: josephdennisg-20
      AMAZON_TAG_2: trafficfore0f-20
      CLICKBANK_ID: trsorce
      EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
      TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
      TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
      TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
      TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
      TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
      TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run Jarvis Sprint
        run: node src/sprint.js
